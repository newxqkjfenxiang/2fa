<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOTP 验证码生成器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: #1a73e8;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .content {
            padding: 20px;
        }
        .account {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .code {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 8px;
            text-align: center;
            margin: 15px 0;
            color: #1a73e8;
        }
        .countdown {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        .progress {
            height: 6px;
            background: #1a73e8;
            transition: width 0.2s linear;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #1557b0; }
        .add-btn {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TOTP 2FA 验证码生成器</h1>
            <p>纯前端 · 本地计算 · 安全可靠</p>
        </header>
        
        <div class="content" id="accounts">
            <!-- 动态添加的账号卡片 -->
        </div>

        <button class="add-btn" onclick="addAccount()">+ 添加新账号</button>
    </div>

    <script>
        // Base32 解码
        function base32Decode(input) {
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            input = input.toUpperCase().replace(/[^A-Z2-7]/g, '');
            let bits = '';
            for (let char of input) {
                const val = alphabet.indexOf(char);
                if (val === -1) throw new Error("无效的 Base32 字符");
                bits += val.toString(2).padStart(5, '0');
            }
            const bytes = [];
            for (let i = 0; i < bits.length; i += 8) {
                if (bits.length - i >= 8) {
                    bytes.push(parseInt(bits.substr(i, 8), 2));
                }
            }
            return new Uint8Array(bytes);
        }

        // TOTP 生成核心函数（使用 Web Crypto API）
        async function generateTOTP(secretBase32, digits = 6, period = 30) {
            const keyBytes = base32Decode(secretBase32);
            
            const epoch = Math.floor(Date.now() / 1000);
            const counter = Math.floor(epoch / period);
            
            // 时间计数器转为 8 字节大端
            const counterBuffer = new ArrayBuffer(8);
            const counterView = new DataView(counterBuffer);
            counterView.setBigUint64(0, BigInt(counter));
            
            // HMAC-SHA1
            const key = await crypto.subtle.importKey(
                "raw", keyBytes, { name: "HMAC", hash: "SHA-1" },
                false, ["sign"]
            );
            
            const hmac = await crypto.subtle.sign("HMAC", key, counterBuffer);
            const hmacBytes = new Uint8Array(hmac);
            
            // 动态截取
            const offset = hmacBytes[hmacBytes.length - 1] & 0x0f;
            const binaryCode = (
                ((hmacBytes[offset] & 0x7f) << 24) |
                ((hmacBytes[offset + 1] & 0xff) << 16) |
                ((hmacBytes[offset + 2] & 0xff) << 8) |
                (hmacBytes[offset + 3] & 0xff)
            );
            
            const code = (binaryCode % Math.pow(10, digits)).toString().padStart(digits, '0');
            return { code, remaining: period - (epoch % period) };
        }

        // 创建账号卡片
        async function createAccountCard(secret = '', label = '我的账号') {
            const id = 'acc-' + Date.now();
            const card = document.createElement('div');
            card.className = 'account';
            card.id = id;
            card.innerHTML = `
                <input type="text" placeholder="账号名称" value="${label}" onchange="updateLabel('${id}', this.value)">
                <input type="text" placeholder="Base32 Secret" value="${secret}" style="margin-top:8px;" onchange="updateSecret('${id}', this.value)">
                <div class="code" id="${id}-code">------</div>
                <div class="countdown" id="${id}-countdown">加载中...</div>
                <div style="height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:8px;">
                    <div class="progress" id="${id}-progress" style="width:100%"></div>
                </div>
            `;
            document.getElementById('accounts').appendChild(card);
            
            if (secret) {
                startUpdating(id, secret);
            }
        }

        let timers = {};

        async function startUpdating(id, secret) {
            if (timers[id]) clearInterval(timers[id]);
            
            const update = async () => {
                try {
                    const { code, remaining } = await generateTOTP(secret);
                    document.getElementById(`${id}-code`).textContent = code;
                    
                    const percent = (remaining / 30) * 100;
                    document.getElementById(`${id}-progress`).style.width = `${percent}%`;
                    document.getElementById(`${id}-countdown`).textContent = `剩余 ${remaining} 秒`;
                } catch (e) {
                    document.getElementById(`${id}-code`).textContent = '错误';
                    document.getElementById(`${id}-countdown`).textContent = e.message;
                }
            };
            
            await update();
            timers[id] = setInterval(update, 1000);
        }

        function updateSecret(id, secret) {
            startUpdating(id, secret);
        }

        function updateLabel(id, label) {
            // 可扩展保存到 localStorage
        }

        function addAccount() {
            createAccountCard('', '新账号');
        }

        // 初始化示例
        window.onload = () => {
            // 你可以在这里添加默认示例
            // createAccountCard('JBSWY3DPEHPK3PXP', '测试账号');
        };
    </script>
</body>
</html>
