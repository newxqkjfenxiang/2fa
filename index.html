<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Security Toolkit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');
        
        :root {
            --primary: #2563eb;
            --success: #22c55e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 24px 16px;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        header {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
        }
        
        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            opacity: 0.85;
            margin-top: 8px;
            font-size: 1.05rem;
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background: #1e2937;
        }
        
        .section {
            background: #0f172a;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.65rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        /* 密码区域 */
        .password-card {
            background: #1e2937;
            border: 2px solid #334155;
            border-radius: 20px;
            padding: 1.75rem 1.5rem;
            font-family: 'Space Grotesk', monospace;
            font-size: 1.55rem;
            letter-spacing: 3px;
            line-height: 1.3;
            min-height: 88px;
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .password-card:hover {
            border-color: #60a5fa;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(37 99 235 / 0.3);
        }
        
        .password-text {
            flex: 1;
            word-break: break-all;
        }
        
        .copy-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: #334155;
            color: #e2e8f0;
            border: none;
            padding: 10px 18px;
            border-radius: 9999px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .copy-btn:hover {
            background: #2563eb;
            transform: translateY(-50%) scale(1.05);
        }
        
        /* 控制区域 */
        .controls {
            margin: 2rem 0;
        }
        
        .slider-container {
            margin-bottom: 1.8rem;
        }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .length-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #60a5fa;
        }
        
        input[type="range"] {
            width: 100%;
            accent-color: #60a5fa;
            height: 6px;
            border-radius: 9999px;
            background: #334155;
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e2937;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .checkbox-item:hover {
            background: #334155;
        }
        
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgb(37 99 235 / 0.5);
        }
        
        /* TOTP 区域 */
        .totp-card {
            background: #1e2937;
            border-radius: 20px;
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .totp-code {
            font-size: 3.2rem;
            font-family: monospace;
            letter-spacing: 12px;
            font-weight: 700;
            margin-bottom: 1rem;
            transition: all 0.4s ease;
        }
        
        .totp-code.flash {
            animation: flash 0.6s ease;
        }
        
        @keyframes flash {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        
        .progress-container {
            height: 8px;
            background: #334155;
            border-radius: 9999px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #eab308);
            width: 100%;
            transition: width 0.3s linear, background 0.4s ease;
        }
        
        .totp-secret-input {
            width: 100%;
            background: #1e2937;
            border: 2px solid #475569;
            color: #e2e8f0;
            padding: 16px 18px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 1.05rem;
            margin-top: 1.5rem;
        }
        
        .totp-secret-input:focus {
            outline: none;
            border-color: #60a5fa;
        }
        
        /* 历史记录 */
        .history {
            margin-top: auto;
            padding-top: 2rem;
            border-top: 1px solid #334155;
        }
        
        .history-title {
            font-size: 1.05rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e2937;
            padding: 12px 16px;
            border-radius: 14px;
            transition: all 0.2s;
        }
        
        .history-item:hover {
            background: #334155;
            transform: translateX(4px);
        }
        
        .history-text {
            font-family: monospace;
            font-size: 1.05rem;
            flex: 1;
        }
        
        .history-time {
            font-size: 0.8rem;
            color: #64748b;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2937;
            color: #e2e8f0;
            padding: 14px 32px;
            border-radius: 9999px;
            font-weight: 500;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
            background: #0f172a;
        }
        
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
            .totp-code {
                font-size: 2.6rem;
                letter-spacing: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Offline Security Toolkit</h1>
            <p class="subtitle">纯前端 • 完全离线 • 本地安全工具</p>
        </header>
        
        <div class="main">
            <!-- 强密码生成器 -->
            <div class="section">
                <div class="section-header">
                    <span style="font-size: 2rem;">🔐</span>
                    <h2 class="section-title">强密码生成器</h2>
                </div>
                
                <div class="password-card" id="password-card">
                    <div class="password-text" id="password-text">P@ssw0rdExample2025!</div>
                    <button class="copy-btn" id="copy-password-btn">
                        📋 复制
                    </button>
                </div>
                
                <div class="controls">
                    <div class="slider-container">
                        <div class="slider-label">
                            <span>密码长度</span>
                            <span class="length-value" id="length-value">20</span>
                        </div>
                        <input type="range" id="length-slider" 
                               min="8" max="64" value="20" step="1">
                    </div>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="upper" checked>
                            <span>ABC 大写</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="lower" checked>
                            <span>abc 小写</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="numbers" checked>
                            <span>123 数字</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="special" checked>
                            <span>#@! 符号</span>
                        </label>
                    </div>
                </div>
                
                <button id="generate-btn" class="generate-btn">
                    🔄 重新生成密码
                </button>
                
                <!-- 历史 -->
                <div class="history">
                    <div class="history-title">📋 最近复制的密码</div>
                    <div class="history-list" id="password-history"></div>
                </div>
            </div>
            
            <!-- TOTP -->
            <div class="section">
                <div class="section-header">
                    <span style="font-size: 2rem;">🔑</span>
                    <h2 class="section-title">TOTP 两步验证码</h2>
                </div>
                
                <div class="totp-card">
                    <div class="totp-code" id="totp-code">------</div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    
                    <div style="font-size: 0.95rem; color: #94a3b8;" id="time-remaining">30 秒后刷新</div>
                </div>
                
                <input type="text" id="totp-secret" 
                       class="totp-secret-input"
                       placeholder="输入 Base32 Secret（如 JBSWY3DPEHPK3PXP）"
                       spellcheck="false" autocomplete="off">
                
                <button id="copy-totp-btn"
                        style="margin-top: 1.5rem; width: 100%; padding: 16px; background: linear-gradient(90deg, #2563eb, #3b82f6); color: white; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 600; cursor: pointer;">
                    📋 复制验证码
                </button>
                
                <!-- 历史 -->
                <div class="history">
                    <div class="history-title">📋 最近复制的验证码</div>
                    <div class="history-list" id="totp-history"></div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>此工具完全离线运行。所有数据仅在浏览器内存中处理，不会存储或上传任何信息。<br>
            刷新或关闭页面后，所有记录将永久清除。</p>
        </footer>
    </div>
    
    <div class="toast" id="toast">
        <span>✅ 已复制</span>
    </div>

    <script>
        // ==================== 状态 ====================
        let passwordHistory = [];
        let totpHistory = [];
        let currentPassword = '';
        let currentTOTP = '';
        let totpInterval = null;
        
        // ==================== 工具 ====================
        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
            }, 2200);
        }
        
        function copyToClipboard(text) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(showToast);
        }
        
        function formatTime() {
            const now = new Date();
            return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        }
        
        function addToHistory(history, text, container) {
            const time = formatTime();
            const existing = history.findIndex(h => h.text === text);
            if (existing !== -1) history.splice(existing, 1);
            
            history.unshift({ text, time });
            if (history.length > 5) history.pop();
            
            renderHistory(history, container);
        }
        
        function renderHistory(history, container) {
            container.innerHTML = '';
            if (history.length === 0) {
                container.innerHTML = `<div style="text-align:center;color:#64748b;padding:20px 0;font-size:0.95rem;">暂无记录</div>`;
                return;
            }
            
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div class="history-text">${item.text}</div>
                    <div class="history-time">${item.time}</div>
                `;
                
                div.addEventListener('click', () => {
                    copyToClipboard(item.text);
                    addToHistory(history, item.text, container);
                });
                
                container.appendChild(div);
            });
        }
        
        // ==================== 密码生成 ====================
        const charSets = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            special: '!@#$%^&*()_+-=[]{}|;:,.<>/?'
        };
        
        function generatePassword(length) {
            const upper = document.getElementById('upper').checked;
            const lower = document.getElementById('lower').checked;
            const numbers = document.getElementById('numbers').checked;
            const special = document.getElementById('special').checked;
            
            let chars = '';
            let mustHave = [];
            
            if (upper) { chars += charSets.upper; mustHave.push(charSets.upper[0]); }
            if (lower) { chars += charSets.lower; mustHave.push(charSets.lower[0]); }
            if (numbers) { chars += charSets.numbers; mustHave.push(charSets.numbers[0]); }
            if (special) { chars += charSets.special; mustHave.push(charSets.special[0]); }
            
            if (!chars) chars = 'abcdefghijklmnopqrstuvwxyz';
            
            const randomValues = new Uint8Array(length);
            crypto.getRandomValues(randomValues);
            
            let password = mustHave.join('');
            
            for (let i = mustHave.length; i < length; i++) {
                password += chars[randomValues[i] % chars.length];
            }
            
            // 打乱
            const arr = password.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = randomValues[i] % (i + 1);
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            
            return arr.join('');
        }
        
        function updatePassword() {
            const length = parseInt(document.getElementById('length-slider').value);
            currentPassword = generatePassword(length);
            document.getElementById('password-text').textContent = currentPassword;
        }
        
        // ==================== TOTP ====================
        function base32Decode(input) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let output = [];
            let buffer = 0, bitsLeft = 0;
            
            input = input.toUpperCase().replace(/=+$/, '');
            
            for (let char of input) {
                const val = alphabet.indexOf(char);
                if (val === -1) continue;
                buffer = (buffer << 5) | val;
                bitsLeft += 5;
                if (bitsLeft >= 8) {
                    output.push((buffer >> (bitsLeft - 8)) & 0xff);
                    bitsLeft -= 8;
                }
            }
            return new Uint8Array(output);
        }
        
        async function hmacSha1(key, data) {
            const cryptoKey = await crypto.subtle.importKey(
                'raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
            );
            const sig = await crypto.subtle.sign('HMAC', cryptoKey, data);
            return new Uint8Array(sig);
        }
        
        async function generateTOTP(secret) {
            if (!secret) return '------';
            try {
                const key = base32Decode(secret);
                const time = Math.floor(Date.now() / 1000 / 30);
                const timeBuffer = new ArrayBuffer(8);
                new DataView(timeBuffer).setBigUint64(0, BigInt(time), false);
                
                const hmac = await hmacSha1(key, timeBuffer);
                const offset = hmac[hmac.length - 1] & 0xf;
                
                const bin = ((hmac[offset] & 0x7f) << 24) |
                           ((hmac[offset + 1] & 0xff) << 16) |
                           ((hmac[offset + 2] & 0xff) << 8) |
                           (hmac[offset + 3] & 0xff);
                
                return (bin % 1000000).toString().padStart(6, '0');
            } catch (e) {
                return 'ERROR';
            }
        }
        
        async function updateTOTP() {
            const secret = document.getElementById('totp-secret').value.trim();
            const codeEl = document.getElementById('totp-code');
            const newCode = await generateTOTP(secret);
            
            if (newCode !== currentTOTP) {
                currentTOTP = newCode;
                codeEl.textContent = newCode;
                codeEl.classList.add('flash');
                setTimeout(() => codeEl.classList.remove('flash'), 600);
            }
        }
        
        function updateProgress() {
            const now = Date.now() / 1000;
            const progress = ((30 - (now % 30)) / 30) * 100;
            const bar = document.getElementById('progress-bar');
            
            bar.style.width = `${progress}%`;
            
            // 颜色渐变
            if (progress > 60) {
                bar.style.background = 'linear-gradient(90deg, #22c55e, #86efac)';
            } else if (progress > 30) {
                bar.style.background = 'linear-gradient(90deg, #eab308, #fde047)';
            } else {
                bar.style.background = 'linear-gradient(90deg, #ef4444, #f87171)';
            }
            
            document.getElementById('time-remaining').textContent = 
                `${Math.ceil(30 - (now % 30))} 秒后刷新`;
        }
        
        function startTOTP() {
            if (totpInterval) clearInterval(totpInterval);
            
            totpInterval = setInterval(async () => {
                await updateTOTP();
                updateProgress();
            }, 800);
            
            updateTOTP();
            updateProgress();
        }
        
        // ==================== 初始化 ====================
        function init() {
            const slider = document.getElementById('length-slider');
            const lengthVal = document.getElementById('length-value');
            
            slider.addEventListener('input', () => {
                lengthVal.textContent = slider.value;
                updatePassword();
            });
            
            // 复选框
            ['upper','lower','numbers','special'].forEach(id => {
                document.getElementById(id).addEventListener('change', updatePassword);
            });
            
            // 生成按钮
            document.getElementById('generate-btn').addEventListener('click', updatePassword);
            
            // 密码复制
            document.getElementById('password-card').addEventListener('click', () => {
                if (currentPassword) {
                    copyToClipboard(currentPassword);
                    addToHistory(passwordHistory, currentPassword, document.getElementById('password-history'));
                }
            });
            
            document.getElementById('copy-password-btn').addEventListener('click', e => {
                e.stopImmediatePropagation();
                if (currentPassword) {
                    copyToClipboard(currentPassword);
                    addToHistory(passwordHistory, currentPassword, document.getElementById('password-history'));
                }
            });
            
            // TOTP
            document.getElementById('totp-secret').addEventListener('input', () => {
                startTOTP();
            });
            
            document.getElementById('copy-totp-btn').addEventListener('click', () => {
                if (currentTOTP && currentTOTP.length === 6) {
                    copyToClipboard(currentTOTP);
                    addToHistory(totpHistory, currentTOTP, document.getElementById('totp-history'));
                }
            });
            
            // 初始化
            updatePassword();
            renderHistory([], document.getElementById('password-history'));
            renderHistory([], document.getElementById('totp-history'));
            
            startTOTP();
        }
        
        window.onload = init;
    </script>
</body>
</html>
