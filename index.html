<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Security Toolkit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #3b82f6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            color: #1e2937;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(to right, #1e40af, #3b82f6);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background: #e2e8f0;
        }
        
        .section {
            background: white;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f1f5f9;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .password-display {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            font-family: 'Space Grotesk', monospace;
            font-size: 1.35rem;
            letter-spacing: 2px;
            word-break: break-all;
            min-height: 68px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .password-display:hover {
            border-color: var(--primary);
            background: #f0f9ff;
        }
        
        .copy-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            border: 1px solid #cbd5e1;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .copy-btn:hover {
            background: #f1f5f9;
            color: #1e40af;
        }
        
        .controls {
            margin: 1.5rem 0;
        }
        
        .slider-container {
            margin-bottom: 1.5rem;
        }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }
        
        .length-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary);
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 1.5rem;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .totp-display {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            color: white;
            border-radius: 16px;
            padding: 1.5rem;
            font-size: 2.2rem;
            font-family: monospace;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 1rem;
            position: relative;
            cursor: pointer;
        }
        
        .countdown {
            text-align: center;
            font-size: 0.95rem;
            color: #64748b;
            margin-top: 8px;
        }
        
        .secret-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: monospace;
            margin-bottom: 1rem;
        }
        
        .secret-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .history {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 2px solid #f1f5f9;
        }
        
        .history-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #64748b;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 10px 14px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .history-item:hover {
            background: #f0f9ff;
        }
        
        .history-time {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2937;
            color: white;
            padding: 12px 28px;
            border-radius: 9999px;
            font-size: 1rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            background: #f8fafc;
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .refresh-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
        
        @media (max-width: 768px) {
            .main {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Offline Security Toolkit</h1>
            <p class="subtitle">纯前端 • 完全离线 • 本地安全工具</p>
        </header>
        
        <div class="main">
            <!-- 强密码生成器 -->
            <div class="section">
                <div class="section-header">
                    <span style="font-size: 1.8rem;">🔐</span>
                    <h2 class="section-title">强密码生成器</h2>
                </div>
                
                <div class="password-display" id="password-display">
                    <span id="password-text">Loading...</span>
                    <button class="copy-btn" id="copy-password-btn">
                        📋 Copy
                    </button>
                </div>
                
                <div class="controls">
                    <div class="slider-container">
                        <div class="slider-label">
                            <span>密码长度</span>
                            <span class="length-value" id="length-value">20</span>
                        </div>
                        <input type="range" id="length-slider" 
                               min="4" max="64" value="20" step="1">
                    </div>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="upper" checked>
                            <span>ABC 大写字母</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="lower" checked>
                            <span>abc 小写字母</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="numbers" checked>
                            <span>123 数字</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="special" checked>
                            <span>#@! 特殊符号</span>
                        </label>
                    </div>
                </div>
                
                <div style="display: flex; gap: 12px; margin-bottom: 2rem;">
                    <button id="generate-btn" 
                            style="flex: 1; padding: 14px; background: #1e40af; color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 1.1rem; cursor: pointer;">
                        🔄 重新生成
                    </button>
                </div>
                
                <!-- 历史记录 -->
                <div class="history">
                    <div class="history-title">最近复制的密码</div>
                    <div class="history-list" id="password-history"></div>
                </div>
            </div>
            
            <!-- TOTP 验证器 -->
            <div class="section">
                <div class="section-header">
                    <span style="font-size: 1.8rem;">🔑</span>
                    <h2 class="section-title">TOTP 验证码</h2>
                </div>
                
                <input type="text" id="totp-secret" 
                       class="secret-input"
                       placeholder="输入 Base32 Secret (例如: JBSWY3DPEHPK3PXP)"
                       spellcheck="false">
                
                <div class="totp-display" id="totp-display">
                    <span id="totp-code">------</span>
                </div>
                
                <div class="countdown" id="countdown">Refresh in <span id="seconds">30</span>s</div>
                
                <div style="display: flex; gap: 12px; margin: 1.5rem 0;">
                    <button id="copy-totp-btn"
                            style="flex: 1; padding: 12px; background: #1e40af; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer;">
                        📋 复制验证码
                    </button>
                </div>
                
                <!-- 历史记录 -->
                <div class="history">
                    <div class="history-title">最近复制的验证码</div>
                    <div class="history-list" id="totp-history"></div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>此工具完全离线运行。所有密码、TOTP 密钥、验证码及复制历史记录均仅在浏览器内存中处理，不会存储、上传或传输任何数据。刷新或关闭页面后，所有数据都会被永久清除。</p>
            <p style="margin-top: 12px; font-size: 0.85rem;">使用 Web Crypto API 实现安全随机数与 HMAC-SHA1 • 符合 RFC 6238</p>
        </footer>
    </div>
    
    <div class="toast" id="toast">Copied!</div>

    <script>
        // ==================== 全局变量 ====================
        let passwordHistory = [];
        let totpHistory = [];
        let currentPassword = '';
        let totpInterval = null;
        let currentSecret = '';
        
        // ==================== 工具函数 ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 1800);
        }
        
        function copyToClipboard(text) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制！');
            }).catch(() => {
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制！');
            });
        }
        
        function formatTime() {
            const now = new Date();
            return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        }
        
        function addToHistory(historyArray, text, listElement, max = 5) {
            const time = formatTime();
            // 如果已存在，更新时间并移到最前
            const existingIndex = historyArray.findIndex(item => item.text === text);
            if (existingIndex !== -1) {
                historyArray.splice(existingIndex, 1);
            }
            
            historyArray.unshift({ text, time });
            
            if (historyArray.length > max) {
                historyArray.pop();
            }
            
            renderHistory(historyArray, listElement);
        }
        
        function renderHistory(historyArray, container) {
            container.innerHTML = '';
            
            if (historyArray.length === 0) {
                const empty = document.createElement('div');
                empty.style.textAlign = 'center';
                empty.style.color = '#94a3b8';
                empty.style.padding = '20px 0';
                empty.style.fontSize = '0.9rem';
                empty.textContent = '暂无记录';
                container.appendChild(empty);
                return;
            }
            
            historyArray.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                
                const content = document.createElement('div');
                content.style.flex = '1';
                content.textContent = item.text;
                
                const time = document.createElement('div');
                time.className = 'history-time';
                time.textContent = item.time;
                
                const copyIcon = document.createElement('button');
                copyIcon.style.background = 'none';
                copyIcon.style.border = 'none';
                copyIcon.style.marginLeft = '12px';
                copyIcon.style.cursor = 'pointer';
                copyIcon.style.fontSize = '1.1rem';
                copyIcon.textContent = '📋';
                
                div.appendChild(content);
                div.appendChild(time);
                div.appendChild(copyIcon);
                
                // 点击整行复制
                div.addEventListener('click', (e) => {
                    if (e.target !== copyIcon) {
                        copyToClipboard(item.text);
                        // 更新时间并移到顶部
                        addToHistory(historyArray, item.text, container);
                    }
                });
                
                copyIcon.addEventListener('click', (e) => {
                    e.stopImmediatePropagation();
                    copyToClipboard(item.text);
                    addToHistory(historyArray, item.text, container);
                });
                
                container.appendChild(div);
            });
        }
        
        // ==================== 密码生成器 ====================
        const charSets = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            special: '!@#$%^&*()_+-=[]{}|;:,.<>/?'
        };
        
        function generatePassword(length, includeUpper, includeLower, includeNumbers, includeSpecial) {
            let chars = '';
            let required = [];
            
            if (includeUpper) {
                chars += charSets.upper;
                required.push(charSets.upper[Math.floor(Math.random() * charSets.upper.length)]);
            }
            if (includeLower) {
                chars += charSets.lower;
                required.push(charSets.lower[Math.floor(Math.random() * charSets.lower.length)]);
            }
            if (includeNumbers) {
                chars += charSets.numbers;
                required.push(charSets.numbers[Math.floor(Math.random() * charSets.numbers.length)]);
            }
            if (includeSpecial) {
                chars += charSets.special;
                required.push(charSets.special[Math.floor(Math.random() * charSets.special.length)]);
            }
            
            if (chars.length === 0) {
                chars = 'abcdefghijklmnopqrstuvwxyz';
            }
            
            // 使用 crypto.getRandomValues 生成安全随机数
            const array = new Uint8Array(length);
            crypto.getRandomValues(array);
            
            let password = '';
            
            // 先加入必需字符
            for (let i = 0; i < required.length; i++) {
                password += required[i];
            }
            
            // 填充剩余字符
            for (let i = required.length; i < length; i++) {
                const randomIndex = array[i] % chars.length;
                password += chars[randomIndex];
            }
            
            // Fisher-Yates 洗牌
            const passwordArray = password.split('');
            for (let i = passwordArray.length - 1; i > 0; i--) {
                const j = array[i] % (i + 1);
                [passwordArray[i], passwordArray[j]] = [passwordArray[j], passwordArray[i]];
            }
            
            return passwordArray.join('');
        }
        
        function updatePassword() {
            const length = parseInt(document.getElementById('length-slider').value);
            const upper = document.getElementById('upper').checked;
            const lower = document.getElementById('lower').checked;
            const numbers = document.getElementById('numbers').checked;
            const special = document.getElementById('special').checked;
            
            // 至少保留一个选项
            const checkedCount = [upper, lower, numbers, special].filter(Boolean).length;
            if (checkedCount === 0) {
                document.getElementById('lower').checked = true;
            }
            
            currentPassword = generatePassword(length, upper, lower, numbers, special);
            document.getElementById('password-text').textContent = currentPassword;
        }
        
        // ==================== TOTP 实现 ====================
        // Base32 解码
        function base32Decode(input) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let output = [];
            let buffer = 0;
            let bitsLeft = 0;
            
            input = input.toUpperCase().replace(/=+$/, '');
            
            for (let i = 0; i < input.length; i++) {
                const char = input[i];
                const val = alphabet.indexOf(char);
                if (val === -1) continue;
                
                buffer = (buffer << 5) | val;
                bitsLeft += 5;
                
                if (bitsLeft >= 8) {
                    output.push((buffer >> (bitsLeft - 8)) & 0xff);
                    bitsLeft -= 8;
                }
            }
            
            return new Uint8Array(output);
        }
        
        // HMAC-SHA1 使用 Web Crypto API
        async function hmacSha1(key, data) {
            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                key,
                { name: 'HMAC', hash: 'SHA-1' },
                false,
                ['sign']
            );
            
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, data);
            return new Uint8Array(signature);
        }
        
        // TOTP 计算
        async function generateTOTP(secret) {
            if (!secret) return '------';
            
            try {
                const key = base32Decode(secret);
                const epoch = Math.floor(Date.now() / 1000);
                const time = Math.floor(epoch / 30);
                
                // 8字节大端序时间
                const timeBuffer = new ArrayBuffer(8);
                const timeView = new DataView(timeBuffer);
                timeView.setBigUint64(0, BigInt(time), false);
                
                const hmac = await hmacSha1(key, timeBuffer);
                
                // 动态截断
                const offset = hmac[hmac.length - 1] & 0xf;
                const binary = ((hmac[offset] & 0x7f) << 24) |
                              ((hmac[offset + 1] & 0xff) << 16) |
                              ((hmac[offset + 2] & 0xff) << 8) |
                              (hmac[offset + 3] & 0xff);
                
                const otp = binary % 1000000;
                return otp.toString().padStart(6, '0');
            } catch (e) {
                console.error(e);
                return 'ERROR';
            }
        }
        
        // 更新 TOTP
        async function updateTOTP() {
            const secretInput = document.getElementById('totp-secret').value.trim();
            currentSecret = secretInput;
            
            const code = await generateTOTP(secretInput);
            document.getElementById('totp-code').textContent = code;
        }
        
        function startTOTPUpdater() {
            if (totpInterval) clearInterval(totpInterval);
            
            totpInterval = setInterval(async () => {
                await updateTOTP();
                
                // 更新倒计时
                const epoch = Math.floor(Date.now() / 1000);
                const secondsLeft = 30 - (epoch % 30);
                document.getElementById('seconds').textContent = secondsLeft;
            }, 1000);
        }
        
        // ==================== 初始化 ====================
        async function init() {
            // 密码生成器事件
            const slider = document.getElementById('length-slider');
            const lengthValue = document.getElementById('length-value');
            
            slider.addEventListener('input', () => {
                lengthValue.textContent = slider.value;
                updatePassword();
            });
            
            // 复选框事件
            const checkboxes = ['upper', 'lower', 'numbers', 'special'];
            checkboxes.forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    updatePassword();
                });
            });
            
            // 重新生成按钮
            document.getElementById('generate-btn').addEventListener('click', updatePassword);
            
            // 密码点击复制
            const passwordDisplay = document.getElementById('password-display');
            passwordDisplay.addEventListener('click', () => {
                if (currentPassword) {
                    copyToClipboard(currentPassword);
                    addToHistory(passwordHistory, currentPassword, document.getElementById('password-history'));
                }
            });
            
            // Copy 按钮
            document.getElementById('copy-password-btn').addEventListener('click', (e) => {
                e.stopImmediatePropagation();
                if (currentPassword) {
                    copyToClipboard(currentPassword);
                    addToHistory(passwordHistory, currentPassword, document.getElementById('password-history'));
                }
            });
            
            // TOTP 事件
            const secretInput = document.getElementById('totp-secret');
            secretInput.addEventListener('input', async () => {
                await updateTOTP();
            });
            
            // TOTP 点击复制
            const totpDisplay = document.getElementById('totp-display');
            totpDisplay.addEventListener('click', async () => {
                const code = document.getElementById('totp-code').textContent;
                if (code && code.length === 6 && code !== '------') {
                    copyToClipboard(code);
                    addToHistory(totpHistory, code, document.getElementById('totp-history'));
                }
            });
            
            document.getElementById('copy-totp-btn').addEventListener('click', async () => {
                const code = document.getElementById('totp-code').textContent;
                if (code && code.length === 6 && code !== '------') {
                    copyToClipboard(code);
                    addToHistory(totpHistory, code, document.getElementById('totp-history'));
                }
            });
            
            // 初始化密码
            updatePassword();
            
            // 初始化 TOTP
            await updateTOTP();
            startTOTPUpdater();
            
            // 初始历史记录占位
            renderHistory(passwordHistory, document.getElementById('password-history'));
            renderHistory(totpHistory, document.getElementById('totp-history'));
        }
        
        // 启动
        window.onload = init;
    </script>
</body>
</html>
