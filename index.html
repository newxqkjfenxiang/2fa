<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Security Toolkit - 离线安全工具箱</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #e2e8f0;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container { max-width: 1000px; width: 100%; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        header p { color: var(--text-muted); font-size: 0.95rem; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--bg-color);
        }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 0.5rem; }

        .input-display-container { display: flex; gap: 0.5rem; align-items: center; }
        
        .display-box {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 1.1rem;
            word-break: break-all;
            cursor: pointer;
            min-height: 46px;
            display: flex;
            align-items: center;
        }
        .display-box:hover { background: #f1f5f9; }

        .input-text {
            width: 100%; padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 1rem; font-family: monospace;
            outline: none; text-transform: uppercase;
        }
        .input-text:focus { border-color: var(--primary); }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer;
            font-weight: 500; font-size: 0.95rem; white-space: nowrap;
        }
        .btn:hover { background: var(--primary-hover); }

        .slider-container { display: flex; align-items: center; gap: 1rem; }
        .slider-container input { flex: 1; cursor: pointer; }
        .range-val { font-family: monospace; font-weight: bold; width: 2rem; text-align: right; }

        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.5rem; }
        .checkbox-label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }

        .totp-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted); }
        .countdown-container { display: flex; align-items: center; gap: 0.5rem; width: 100%; }
        .progress-bar-bg { flex: 1; background: var(--border-color); height: 6px; border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { background: var(--primary); height: 100%; width: 100%; transition: width 1s linear; }

        .history-section { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px dashed var(--border-color); }
        .history-title { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.75rem; }
        .history-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-color); padding: 0.5rem 0.75rem; border-radius: 6px;
            font-size: 0.85rem; cursor: pointer;
        }
        .history-item:hover { background: #f1f5f9; }
        .history-content { font-family: monospace; word-break: break-all; flex: 1; margin-right: 0.5rem; }
        .history-time { color: var(--text-muted); font-size: 0.75rem; margin-right: 0.5rem; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; border-radius: 4px; background: white; border: 1px solid var(--border-color); cursor: pointer; }

        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #1e293b; color: white; padding: 0.6rem 1.2rem; border-radius: 50px;
            font-size: 0.9rem; opacity: 0; transition: all 0.3s ease; z-index: 9999; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .error-text { color: var(--error-color); font-size: 0.8rem; margin-top: 0.25rem; display: none; }
        footer { margin-top: 3rem; text-align: center; font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>冲 离线安全工具箱</h1>
            <p>100% 纯前端本地内存运行 · 无网络请求 · 刷新即焚</p>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-title">🔐 Strong Password Generator</div>
                <div class="form-group">
                    <label>Generated Password</label>
                    <div class="input-display-container">
                        <div id="passwordDisplay" class="display-box" title="点击复制"></div>
                        <button id="btnRefreshPass" class="btn">🔄</button>
                        <button id="btnCopyPass" class="btn">📋 Copy</button>
                    </div>
                </div>
                <div class="form-group">
                    <div class="slider-container">
                        <label>Length:</label>
                        <input type="range" id="passLength" min="4" max="64" value="20">
                        <span id="passLengthVal" class="range-val">20</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Character Sets</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" class="pass-charset" value="upper" checked> ABC</label>
                        <label class="checkbox-label"><input type="checkbox" class="pass-charset" value="lower" checked> abc</label>
                        <label class="checkbox-label"><input type="checkbox" class="pass-charset" value="digit" checked> 123</label>
                        <label class="checkbox-label"><input type="checkbox" class="pass-charset" value="symbol" checked> #@!</label>
                    </div>
                </div>
                <div class="history-section">
                    <div class="history-title">Password Recent Copies</div>
                    <ul id="passwordHistory" class="history-list"></ul>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🔑 TOTP Authenticator</div>
                <div class="form-group">
                    <label for="totpSecret">TOTP Secret (Base32)</label>
                    <input type="text" id="totpSecret" class="input-text" placeholder="例如: JBSWY3DPEHPK3PXP" autocomplete="off">
                    <div id="totpError" class="error-text">无效的 Base32 密钥格式</div>
                </div>
                <div class="form-group">
                    <label>Verification Code</label>
                    <div class="input-display-container">
                        <div id="totpDisplay" class="display-box" style="font-size: 1.5rem; justify-content: center; font-weight: bold; letter-spacing: 2px;">------</div>
                        <button id="btnCopyTotp" class="btn">📋 Copy</button>
                    </div>
                    <div class="totp-meta">
                        <div class="countdown-container">
                            <span id="totpCountdownText">Refresh in --s</span>
                            <div class="progress-bar-bg"><div id="totpProgressBar" class="progress-bar-fill"></div></div>
                        </div>
                    </div>
                </div>
                <div class="history-section">
                    <div class="history-title">TOTP Recent Copies</div>
                    <ul id="totpHistory" class="history-list"></ul>
                </div>
            </div>
        </div>

        <footer>
            此工具完全离线运行。所有密码、TOTP 密钥、验证码及复制历史记录均仅在浏览器内存中处理，不会存储、上传或传输任何数据。刷新或关闭页面后，所有数据都会被永久清除。
        </footer>
    </div>

    <div id="toast" class="toast">Copied!</div>

    <script>
        // --- 仅运行时内存存储（严格禁止 localStorage 等） ---
        const passwordHistoryList = [];
        const totpHistoryList = [];

        const charSets = {
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lower: "abcdefghijklmnopqrstuvwxyz",
            digit: "0123456789",
            symbol: "!@#$%^&*()_+-=[]{}|;':\",./<>?"
        };

        // --- 全局 UI 工具 ---
        function showToast(msg = "Copied!") {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1000);
        }

        function getHHMMSS() {
            return new Date().toTimeString().split(' ')[0];
        }

        function copyText(text) {
            const clean = text.replace(/\s+/g, '');
            if (!clean || clean.includes('---')) return;
            navigator.clipboard.writeText(clean).then(() => showToast()).catch(() => {
                const el = document.createElement('textarea');
                el.value = clean; document.body.appendChild(el);
                el.select(); document.execCommand('copy');
                document.body.removeChild(el);
                showToast();
            });
        }

        // --- 历史纪录维护（保持最多5条，相同项置顶） ---
        function handleHistory(type, val) {
            if (!val || val.includes('---')) return;
            const list = type === 'password' ? passwordHistoryList : totpHistoryList;
            const idx = list.findIndex(item => item.val === val);
            if (idx !== -1) list.splice(idx, 1);
            
            list.unshift({ val, time: getHHMMSS() });
            if (list.length > 5) list.pop();

            renderHistory(type);
        }

        function renderHistory(type) {
            const el = document.getElementById(type === 'password' ? 'passwordHistory' : 'totpHistory');
            const list = type === 'password' ? passwordHistoryList : totpHistoryList;
            el.innerHTML = '';
            list.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.onclick = () => { copyText(item.val); handleHistory(type, item.val); };
                li.innerHTML = `<span class="history-content">${item.val}</span>
                                <span class="history-time">${item.time}</span>
                                <button class="btn-sm">📋</button>`;
                li.querySelector('button').onclick = (e) => {
                    e.stopPropagation();
                    copyText(item.val);
                    handleHistory(type, item.val);
                };
                el.appendChild(li);
            });
        }

        // --- 功能一：安全强密码逻辑 ---
        function getCryptoRandInt(max) {
            const arr = new Uint32Array(1);
            window.crypto.getRandomValues(arr);
            return arr[0] % max;
        }

        function generatePassword() {
            const len = parseInt(document.getElementById('passLength').value);
            const checkboxes = document.querySelectorAll('.pass-charset:checked');
            if (checkboxes.length === 0) return;

            let pwdArr = [];
            let fullPool = "";

            // 1. 强制保证每种选中的字符集至少出一个
            checkboxes.forEach(cb => {
                const pool = charSets[cb.value];
                pwdArr.push(pool[getCryptoRandInt(pool.length)]);
                fullPool += pool;
            });

            // 2. 补齐剩余长度 （修复了上一版将 while 条件写错产生的卡死问题）
            while (pwdArr.length < len) {
                pwdArr.push(fullPool[getCryptoRandInt(fullPool.length)]);
            }

            // 3. Fisher-Yates 洗牌乱序
            for (let i = pwdArr.length - 1; i > 0; i--) {
                const j = getCryptoRandInt(i + 1);
                [pwdArr[i], pwdArr[j]] = [pwdArr[j], pwdArr[i]];
            }

            document.getElementById('passwordDisplay').textContent = pwdArr.join('');
        }

        // 密码事件绑定
        document.getElementById('passLength').addEventListener('input', (e) => {
            document.getElementById('passLengthVal').textContent = e.target.value;
            generatePassword();
        });
        document.querySelectorAll('.pass-charset').forEach(cb => {
            cb.addEventListener('change', (e) => {
                if (document.querySelectorAll('.pass-charset:checked').length === 0) {
                    e.target.checked = true;
                    alert("At least one character set must be selected.");
                    return;
                }
                generatePassword();
            });
        });
        document.getElementById('btnRefreshPass').addEventListener('click', generatePassword);
        
        const copyPassAct = () => {
            const txt = document.getElementById('passwordDisplay').textContent;
            copyText(txt); handleHistory('password', txt);
        };
        document.getElementById('btnCopyPass').addEventListener('click', copyPassAct);
        document.getElementById('passwordDisplay').addEventListener('click', copyPassAct);


        // ==========================================
        // 功能二：🔑 TOTP 算法原生 Web Crypto 实现
        // ==========================================
        function base32ToBytes(b32) {
            b32 = b32.replace(/\s+/g, '').replace(/=/g, '').toUpperCase();
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567"; // 修复了之前的基数表拼写丢失
            let bits = 0, value = 0, bytes = [];

            for (let i = 0; i < b32.length; i++) {
                const idx = alphabet.indexOf(b32[i]);
                if (idx === -1) throw new Error();
                value = (value << 5) | idx;
                bits += 5;
                if (bits >= 8) {
                    bytes.push((value >>> (bits - 8)) & 255);
                    bits -= 8;
                }
            }
            return new Uint8Array(bytes);
        }

        async function calcTOTP(secretB32) {
            try {
                const keyBytes = base32ToBytes(secretB32);
                if (keyBytes.length === 0) return null;

                const epoch = Math.floor(Date.now() / 1000);
                const counter = Math.floor(epoch / 30);

                const counterBytes = new ArrayBuffer(8);
                const view = new DataView(counterBytes);
                view.setUint32(0, 0);
                view.setUint32(4, counter);

                const cryptoKey = await window.crypto.subtle.importKey(
                    "raw", keyBytes, { name: "HMAC", hash: { name: "SHA-1" } }, false, ["sign"]
                );
                const hmacResult = await window.crypto.subtle.sign("HMAC", cryptoKey, counterBytes);
                const hmacBytes = new Uint8Array(hmacResult);

                const offset = hmacBytes[hmacBytes.length - 1] & 0xf;
                const codeInt = ((hmacBytes[offset] & 0x7f) << 24) |
                                ((hmacBytes[offset + 1] & 0xff) << 16) |
                                ((hmacBytes[offset + 2] & 0xff) << 8) |
                                (hmacBytes[offset + 3] & 0xff);

                let codeStr = (codeInt % 1000000).toString().padStart(6, '0');
                return codeStr.slice(0, 3) + " " + codeStr.slice(3);
            } catch (e) { return null; }
        }

        async function updateTotpLoop() {
            const secret = document.getElementById('totpSecret').value.trim();
            const remaining = 30 - (Math.floor(Date.now() / 1000) % 30);
            
            document.getElementById('totpProgressBar').style.width = (remaining / 30) * 100 + "%";
            document.getElementById('totpCountdownText').textContent = `Refresh in ${remaining}s`;

            if (!secret) {
                document.getElementById('totpDisplay').textContent = '------';
                document.getElementById('totpError').style.display = 'none';
                return;
            }

            const code = await calcTOTP(secret);
            if (code) {
                document.getElementById('totpDisplay').textContent = code;
                document.getElementById('totpError').style.display = 'none';
            } else {
                document.getElementById('totpDisplay').textContent = '------';
                document.getElementById('totpError').style.display = 'block';
            }
        }

        document.getElementById('totpSecret').addEventListener('input', updateTotpLoop);
        
        const copyTotpAct = () => {
            const txt = document.getElementById('totpDisplay').textContent;
            copyText(txt); handleHistory('totp', txt);
        };
        document.getElementById('btnCopyTotp').addEventListener('click', copyTotpAct);
        document.getElementById('totpDisplay').addEventListener('click', copyTotpAct);

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            generatePassword();
            updateTotpLoop();
            setInterval(updateTotpLoop, 1000);
        });
    </script>
</body>
</html>
