<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOTP Generator</title>

<style>
*{
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    margin:0;
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#222;
}

.card{
    width:420px;
    max-width:95%;
    background:white;
    border-radius:18px;
    padding:28px;
    box-shadow:0 10px 35px rgba(0,0,0,.08);
}

h1{
    margin:0 0 25px;
    text-align:center;
    font-size:28px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.inputWrap{
    position:relative;
}

input{
    width:100%;
    padding:14px;
    padding-right:55px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

.toggle{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    user-select:none;
    color:#666;
}

.code{
    text-align:center;
    font-size:48px;
    font-weight:700;
    margin:35px 0 15px;
    letter-spacing:4px;
}

.timer{
    text-align:center;
    font-size:18px;
    color:#555;
}

.bar{
    width:100%;
    height:10px;
    background:#ddd;
    border-radius:999px;
    margin-top:14px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:#4f46e5;
    width:100%;
    transition:width 1s linear;
}

button{
    margin-top:25px;
    width:100%;
    padding:13px;
    border:none;
    background:#4f46e5;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.92;
}

.status{
    text-align:center;
    margin-top:15px;
    color:#d00;
    min-height:20px;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#888;
    font-size:13px;
}

@media (prefers-color-scheme:dark){

body{
background:#111827;
color:white;
}

.card{
background:#1f2937;
}

input{
background:#111827;
border:1px solid #374151;
color:white;
}

.bar{
background:#374151;
}

}
</style>

</head>
<body>

<div class="card">

<h1>🔐 TOTP Generator</h1>

<label>Base32 Secret</label>

<div class="inputWrap">
<input id="secret" type="password" autocomplete="off" spellcheck="false">
<div class="toggle" id="toggle">👁</div>
</div>

<div class="code" id="code">------</div>

<div class="timer">
<span id="remain">30</span>s remaining
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<button id="copy">Copy Code</button>

<div class="status" id="status"></div>

<div class="footer">
Everything runs locally in your browser.<br>
Nothing is uploaded or stored.
</div>

</div>

<script>

const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";

function base32Decode(input){

input=input.toUpperCase().replace(/[\s-]/g,"");

let bits="";

for(const c of input){

const val=alphabet.indexOf(c);

if(val===-1)
throw new Error();

bits+=val.toString(2).padStart(5,"0");

}

const bytes=[];

for(let i=0;i+8<=bits.length;i+=8){

bytes.push(parseInt(bits.substring(i,i+8),2));

}

return new Uint8Array(bytes);

}

async function generate(secret){

const keyBytes=base32Decode(secret);

const epoch=Math.floor(Date.now()/1000);

const counter=Math.floor(epoch/30);

const buf=new ArrayBuffer(8);

const view=new DataView(buf);

view.setUint32(4,counter);

const key=await crypto.subtle.importKey(
"raw",
keyBytes,
{
name:"HMAC",
hash:"SHA-1"
},
false,
["sign"]
);

const hmac=await crypto.subtle.sign("HMAC",key,buf);

const hash=new Uint8Array(hmac);

const offset=hash[19]&15;

const code=((hash[offset]&127)<<24)
|((hash[offset+1]&255)<<16)
|((hash[offset+2]&255)<<8)
|(hash[offset+3]&255);

return (code%1000000).toString().padStart(6,"0");

}

const secret=document.getElementById("secret");
const code=document.getElementById("code");
const remain=document.getElementById("remain");
const fill=document.getElementById("fill");
const status=document.getElementById("status");

let lastCounter=-1;

async function refresh(){

const text=secret.value.trim();

const sec=30-(Math.floor(Date.now()/1000)%30);

remain.textContent=sec;

fill.style.width=(sec/30*100)+"%";

if(!text){

code.textContent="------";
status.textContent="";
return;

}

const counter=Math.floor(Date.now()/30000);

if(counter===lastCounter)
return;

lastCounter=counter;

try{

const c=await generate(text);

code.textContent=c.slice(0,3)+" "+c.slice(3);

status.textContent="";

}catch{

code.textContent="------";
status.textContent="Invalid Base32 Secret";

}

}

setInterval(refresh,1000);

secret.addEventListener("input",()=>{

lastCounter=-1;

refresh();

});

refresh();

document.getElementById("toggle").onclick=()=>{

secret.type=secret.type==="password"?"text":"password";

};

document.getElementById("copy").onclick=()=>{

const txt=code.textContent.replace(/\s/g,"");

if(txt==="------") return;

navigator.clipboard.writeText(txt);

status.style.color="#16a34a";

status.textContent="Copied!";

setTimeout(()=>{

status.style.color="#d00";

status.textContent="";

},1000);

};

</script>

</body>
</html>
